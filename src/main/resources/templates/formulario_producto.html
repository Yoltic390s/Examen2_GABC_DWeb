<!DOCTYPE html>
<html lang="es" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="utf-8">
    <title th:text="${producto.id == null ? 'Nuevo Producto' : 'Editar Producto'}"></title>
    <link rel="stylesheet" href="https://fonts.googleapis.com/css?family=Source+Sans+Pro:300,400,400i,700&display=fallback">
    <link rel="stylesheet" th:href="@{/plugins/fontawesome-free/css/all.min.css}">
    <link rel="stylesheet" th:href="@{/dist/css/adminlte.min.css}">
</head>
<body class="hold-transition sidebar-mini">
<div class="wrapper">

    <nav class="main-header navbar navbar-expand navbar-white navbar-light">
        <ul class="navbar-nav"><li class="nav-item"><a class="nav-link" data-widget="pushmenu" href="#" role="button"><i class="fas fa-bars"></i></a></li></ul>
        <ul class="navbar-nav ml-auto"><li class="nav-item d-flex align-items-center mr-3"><i class="fas fa-user mr-2"></i> <span class="text-dark font-weight-bold" th:text="${nombreUsuario}"></span></li></ul>
    </nav>

    <aside class="main-sidebar sidebar-light-primary elevation-4">
        <a href="#" class="brand-link text-center"><span class="brand-text font-weight-light" style="font-size: 1.5rem; color: black;">Sistema X</span></a>
        <div class="sidebar">
            <nav class="mt-2">
                <ul class="nav nav-pills nav-sidebar flex-column" role="menu">
                    <li class="nav-item"><a th:href="@{/dashboard}" class="nav-link"><i class="nav-icon fas fa-home"></i><p>Inicio</p></a></li>
                    <li class="nav-item"><a th:href="@{/productos}" class="nav-link active"><i class="nav-icon fas fa-box"></i><p>Productos</p></a></li>
                    <li class="nav-item"><a th:href="@{/ventas}" class="nav-link"><i class="nav-icon fas fa-shopping-cart"></i><p>Ventas</p></a></li>
                    <li class="nav-item"><a th:href="@{/facturacion}" class="nav-link"><i class="nav-icon fas fa-file-invoice-dollar"></i><p>Facturación</p></a></li>
                    <li class="nav-header"></li>
                    <li class="nav-item border-top"><a th:href="@{/logout}" class="nav-link"><p class="text-dark">Salir</p></a></li>
                </ul>
            </nav>
        </div>
    </aside>

    <div class="content-wrapper">
        <section class="content-header">
            <div class="container-fluid"><h1 th:text="${producto.id == null ? 'Registrar Producto' : 'Modificar Producto'}"></h1></div>
        </section>

        <section class="content">
            <div class="container-fluid">
                <div class="card card-primary">
                    <div class="card-header"><h3 class="card-title">Datos del Electrónico</h3></div>
                    <form th:action="@{/productos/guardar}" th:object="${producto}" method="post">
                        <input type="hidden" th:field="*{id}" th:if="${producto.id != null}" />
                        <div class="card-body">
                            <div class="form-group">
                                <label>Nombre del Producto</label>
                                <input type="text" class="form-control" th:field="*{nombre}" placeholder="Ej. Laptop HP Pavilion" required>
                            </div>
                            <div class="form-group">
                                <label>Descripción</label>
                                <input type="text" class="form-control" th:field="*{descripcion}" placeholder="Ej. 8GB RAM, 256GB SSD">
                            </div>
                            <div class="row">
                                <div class="col-md-6 form-group">
                                    <label>Precio Unitario ($)</label>
                                    <input type="number" step="0.01" class="form-control" th:field="*{precio}" required min="0.01">
                                </div>
                                <div class="col-md-6 form-group">
                                    <label>Stock (Cantidad en Inventario)</label>
                                    <input type="number" class="form-control" th:field="*{stock}" required min="0">
                                </div>
                            </div>
                        </div>
                        <div class="card-footer text-right">
                            <a th:href="@{/productos}" class="btn btn-secondary">Cancelar</a>
                            <button type="submit" class="btn btn-success">Guardar Producto</button>
                        </div>
                    </form>
                </div>
            </div>
        </section>
    </div>
</div>
<script th:src="@{/plugins/jquery/jquery.min.js}"></script>
<script th:src="@{/plugins/bootstrap/js/bootstrap.bundle.min.js}"></script>
<script th:src="@{/dist/js/adminlte.min.js}"></script>
</body>
</html>
