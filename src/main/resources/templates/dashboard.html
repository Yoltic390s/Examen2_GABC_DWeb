<!DOCTYPE html>
<html lang="es" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Sistema X | Inicio</title>
    <link rel="stylesheet" href="https://fonts.googleapis.com/css?family=Source+Sans+Pro:300,400,400i,700&display=fallback">
    <link rel="stylesheet" th:href="@{/plugins/fontawesome-free/css/all.min.css}">
    <link rel="stylesheet" th:href="@{/dist/css/adminlte.min.css}">
</head>
<body class="hold-transition sidebar-mini">
<div class="wrapper">

    <nav class="main-header navbar navbar-expand navbar-white navbar-light">
        <ul class="navbar-nav">
            <li class="nav-item"><a class="nav-link" data-widget="pushmenu" href="#" role="button"><i class="fas fa-bars"></i></a></li>
        </ul>
        <ul class="navbar-nav ml-auto">
            <li class="nav-item d-flex align-items-center mr-3">
                <i class="fas fa-user mr-2"></i> <span class="text-dark font-weight-bold" th:text="${nombreUsuario}">Usuario</span>
            </li>
        </ul>
    </nav>

    <aside class="main-sidebar sidebar-light-primary elevation-4">
        <a href="#" class="brand-link text-center">
            <span class="brand-text font-weight-light" style="font-size: 1.5rem; color: black;">Sistema X</span>
        </a>
        <div class="sidebar">
            <nav class="mt-2">
                <ul class="nav nav-pills nav-sidebar flex-column" role="menu" data-accordion="false">
                    <li class="nav-item"><a th:href="@{/dashboard}" class="nav-link active"><i class="nav-icon fas fa-home"></i><p>Inicio</p></a></li>
                    <li class="nav-item"><a th:href="@{/productos}" class="nav-link"><i class="nav-icon fas fa-box"></i><p>Productos</p></a></li>
                    <li class="nav-item"><a th:href="@{/ventas}" class="nav-link"><i class="nav-icon fas fa-shopping-cart"></i><p>Ventas</p></a></li>
                    <li class="nav-item"><a th:href="@{/facturacion}" class="nav-link"><i class="nav-icon fas fa-file-invoice-dollar"></i><p>Facturación</p></a></li>
                    <li class="nav-header"></li>
                    <li class="nav-item border-top"><a th:href="@{/logout}" class="nav-link"><p class="text-danger">Salir</p></a></li>
                </ul>
            </nav>
        </div>
    </aside>

    <div class="content-wrapper bg-white">
        <section class="content-header"></section>
        <section class="content">
            <div class="container-fluid">

                <div class="row">
                    <div class="col-lg-3 col-6"><div class="small-box bg-info"><div class="inner"><h3 th:text="${totalOrdenes}">0</h3><p>Órdenes de compra</p></div><div class="icon"><i class="fas fa-shopping-bag"></i></div><a th:href="@{/ventas}" class="small-box-footer">Más información <i class="fas fa-arrow-circle-right"></i></a></div></div>
                    <div class="col-lg-3 col-6"><div class="small-box bg-success"><div class="inner"><h3>$<span th:text="${ingresosTotales}">0.00</span></h3><p>Ingresos Totales</p></div><div class="icon"><i class="fas fa-chart-bar"></i></div><a th:href="@{/ventas}" class="small-box-footer">Más información <i class="fas fa-arrow-circle-right"></i></a></div></div>
                    <div class="col-lg-3 col-6"><div class="small-box bg-warning"><div class="inner"><h3 th:text="${totalProductos}">0</h3><p>Productos</p></div><div class="icon"><i class="fas fa-box-open"></i></div><a th:href="@{/productos}" class="small-box-footer">Más información <i class="fas fa-arrow-circle-right"></i></a></div></div>
                    <div class="col-lg-3 col-6"><div class="small-box bg-danger"><div class="inner"><h3 th:text="${totalUsuarios}">0</h3><p>Usuarios registrados</p></div><div class="icon"><i class="fas fa-user-plus"></i></div><div class="small-box-footer" style="padding: 13px;"></div></div></div>
                </div>

                <div class="row">
                    <div class="col-12">
                        <div class="card" style="background-color: #17a2b8; color: white;">
                            <div class="card-header border-0"><h3 class="card-title text-white">Ventas por mes (Tiempo Real)</h3></div>
                            <div class="card-body bg-white">
                                <div class="chart">
                                    <div style="position: relative; height: 250px; width: 100%;">
                                        <canvas id="lineChart"></canvas>
                                    </div>
                                </div>
                            </div>
                        </div>
                    </div>
                </div>

            </div>
        </section>
    </div>
</div>

<script th:src="@{/plugins/jquery/jquery.min.js}"></script>
<script th:src="@{/plugins/bootstrap/js/bootstrap.bundle.min.js}"></script>
<script th:src="@{/dist/js/adminlte.min.js}"></script>
<script th:src="@{/plugins/chart.js/Chart.min.js}"></script>

<script th:inline="javascript">
    $(function () {
        // Inyectamos las variables enviadas desde Java
        var etiquetasMeses = /*[[${labelsMeses}]]*/ ['Ene', 'Feb'];
        var datosVentas = /*[[${dataMeses}]]*/ [0, 0];

        var lineChartCanvas = $('#lineChart').get(0).getContext('2d');
        var lineChartOptions = {
            maintainAspectRatio : false,
            responsive : true,
            legend: { display: false },
            scales: {
                xAxes: [{ gridLines : { display : false } }],
                yAxes: [{ gridLines : { display : false }, ticks: { beginAtZero: true } }]
            }
        };

        var lineChartData = {
            labels  : etiquetasMeses,
            datasets: [
                {
                    label               : 'Ventas ($)',
                    backgroundColor     : 'rgba(60,141,188,0.9)',
                    borderColor         : 'rgba(60,141,188,0.8)',
                    pointRadius         : 5,
                    pointColor          : '#3b8bba',
                    pointStrokeColor    : 'rgba(60,141,188,1)',
                    pointHighlightFill  : '#fff',
                    pointHighlightStroke: 'rgba(60,141,188,1)',
                    data                : datosVentas,
                    fill                : false
                }
            ]
        }

        new Chart(lineChartCanvas, { type: 'line', data: lineChartData, options: lineChartOptions });
    })
</script>
</body>
</html>
