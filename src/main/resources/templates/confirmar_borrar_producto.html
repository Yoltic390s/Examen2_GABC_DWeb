<!DOCTYPE html>
<html lang="es" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="utf-8">
    <title>Eliminar Producto</title>
    <link rel="stylesheet" href="https://fonts.googleapis.com/css?family=Source+Sans+Pro:300,400,400i,700&display=fallback">
    <link rel="stylesheet" th:href="@{/plugins/fontawesome-free/css/all.min.css}">
    <link rel="stylesheet" th:href="@{/dist/css/adminlte.min.css}">
</head>
<body class="hold-transition sidebar-mini">
<div class="wrapper">

    <nav class="main-header navbar navbar-expand navbar-white navbar-light" style="margin-left: 0;">
        <ul class="navbar-nav ml-auto">
            <li class="nav-item d-flex align-items-center mr-4">
                <span class="text-secondary"><i class="fas fa-user-circle"></i> Hola, <b th:text="${nombreUsuario}">Usuario</b></span>
            </li>
        </ul>
    </nav>

    <div class="content-wrapper" style="margin-left: 0;">
        <section class="content-header">
            <div class="container-fluid">
                <h1 class="text-danger"><i class="fas fa-exclamation-triangle"></i> Confirmar Eliminación</h1>
            </div>
        </section>

        <section class="content">
            <div class="container-fluid">
                <div class="row justify-content-center">
                    <div class="col-md-6">
                        <div class="card card-danger">
                            <div class="card-header">
                                <h3 class="card-title">Estás a punto de borrar este producto. Esta acción no se puede deshacer.</h3>
                            </div>

                            <!-- Formulario que envía el POST final para borrar -->
                            <form th:action="@{/productos/eliminar/{id}(id=${producto.id})}" method="post">
                                <div class="card-body">
                                    <!-- CAMPOS DE SOLO LECTURA -->
                                    <div class="form-group">
                                        <label>Nombre del Producto</label>
                                        <input type="text" class="form-control" th:value="${producto.nombre}" readonly>
                                    </div>
                                    <div class="form-group">
                                        <label>Descripción</label>
                                        <input type="text" class="form-control" th:value="${producto.descripcion}" readonly>
                                    </div>
                                    <div class="row">
                                        <div class="col-md-6 form-group">
                                            <label>Precio Unitario ($)</label>
                                            <input type="text" class="form-control" th:value="${producto.precio}" readonly>
                                        </div>
                                        <div class="col-md-6 form-group">
                                            <label>Stock Actual</label>
                                            <input type="text" class="form-control" th:value="${producto.stock}" readonly>
                                        </div>
                                    </div>
                                </div>
                                <div class="card-footer text-right">
                                    <a th:href="@{/productos}" class="btn btn-secondary">Regresar</a>
                                    <button type="submit" class="btn btn-danger"><i class="fas fa-trash"></i> Sí, Borrar Definitivamente</button>
                                </div>
                            </form>
                        </div>
                    </div>
                </div>
            </div>
        </section>
    </div>
</div>
<script th:src="@{/plugins/jquery/jquery.min.js}"></script>
<script th:src="@{/plugins/bootstrap/js/bootstrap.bundle.min.js}"></script>
<script th:src="@{/dist/js/adminlte.min.js}"></script>
</body>
</html>
