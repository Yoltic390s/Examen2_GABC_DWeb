<!DOCTYPE html>
<html lang="es" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="utf-8">
    <title>Sistema X | Agregar Detalle</title>
    <link rel="stylesheet" th:href="@{/plugins/fontawesome-free/css/all.min.css}">
    <link rel="stylesheet" th:href="@{/dist/css/adminlte.min.css}">
</head>
<body class="hold-transition sidebar-mini">
<div class="wrapper">

    <nav class="main-header navbar navbar-expand navbar-white navbar-light">
        <ul class="navbar-nav"><li class="nav-item"><a class="nav-link" data-widget="pushmenu" href="#"><i class="fas fa-bars"></i></a></li></ul>
        <ul class="navbar-nav ml-auto"><li class="nav-item d-flex align-items-center mr-3"><i class="fas fa-user mr-2"></i> <span class="text-dark font-weight-bold" th:text="${nombreUsuario}"></span></li></ul>
    </nav>

    <aside class="main-sidebar sidebar-light-primary elevation-4">
        <a href="#" class="brand-link text-center"><span class="brand-text font-weight-light" style="font-size: 1.5rem; color: black;">Sistema X</span></a>
        <div class="sidebar">
            <nav class="mt-2">
                <ul class="nav nav-pills nav-sidebar flex-column">
                    <li class="nav-item"><a th:href="@{/dashboard}" class="nav-link"><i class="nav-icon fas fa-home"></i><p>Inicio</p></a></li>
                    <li class="nav-item"><a th:href="@{/productos}" class="nav-link"><i class="nav-icon fas fa-box"></i><p>Productos</p></a></li>
                    <li class="nav-item"><a th:href="@{/ventas}" class="nav-link active"><i class="nav-icon fas fa-shopping-cart"></i><p>Ventas</p></a></li>
                    <li class="nav-item"><a th:href="@{/facturacion}" class="nav-link"><i class="nav-icon fas fa-file-invoice-dollar"></i><p>Facturación</p></a></li>
                    <li class="nav-item border-top"><a th:href="@{/logout}" class="nav-link"><p class="text-dark">Salir</p></a></li>
                </ul>
            </nav>
        </div>
    </aside>

    <div class="content-wrapper bg-white">
        <section class="content-header">
            <div class="container-fluid">
                <h2>Agregar producto/servicio a la Venta <span th:text="${venta.id}"></span> cliente <span th:text="${venta.nombreCliente}"></span></h2>
            </div>
        </section>

        <section class="content mt-3">
            <div class="container-fluid">
                <!-- Alertas de Stock o Éxito -->
                <div th:if="${error}" class="alert alert-danger" th:text="${error}"></div>
                <div th:if="${exito}" class="alert alert-success" th:text="${exito}"></div>

                <div class="row">
                    <div class="col-md-8">
                        <form th:action="@{/ventas/{id}/agregar(id=${venta.id})}" method="post">

                            <div class="form-group">
                                <label style="font-weight: normal;">Producto/Servicio</label>
                                <select class="form-control" name="productoId" required>
                                    <option value="" disabled selected>Seleccione un producto</option>
                                    <option th:each="p : ${productos}" th:value="${p.id}" th:text="${p.nombre} + ' ($' + ${p.precio} + ')'"></option>
                                </select>
                            </div>

                            <div class="form-group mt-4">
                                <label style="font-weight: normal;">Cantidad</label>
                                <input type="number" class="form-control" name="cantidad" required min="1">
                            </div>

                            <div class="mt-4">
                                <button type="submit" class="btn btn-warning mr-2" style="background-color: #ffca28; border-color: #ffca28; width: 120px;">Guardar</button>
                                <a th:href="@{/ventas}" class="btn btn-light border" style="width: 120px;">Terminar</a>
                            </div>
                        </form>
                    </div>
                </div>

                <div class="row mt-5" th:if="${not #lists.isEmpty(detalles)}">
                    <div class="col-md-8">
                        <h4>Artículos en la venta:</h4>
                        <table class="table table-sm text-center">
                            <thead class="bg-light">
                            <tr><th>ID Prod.</th><th>Cantidad</th><th>Subtotal</th></tr>
                            </thead>
                            <tbody>
                            <tr th:each="d : ${detalles}">
                                <td th:text="${d.productoId}"></td>
                                <td th:text="${d.cantidad}"></td>
                                <td th:text="'$' + ${d.subtotal}"></td>
                            </tr>
                            </tbody>
                        </table>
                        <h5 class="text-right mt-2 text-success">Total acumulado: $<span th:text="${venta.total}"></span></h5>
                    </div>
                </div>

            </div>
        </section>
    </div>
</div>
<script th:src="@{/plugins/jquery/jquery.min.js}"></script>
<script th:src="@{/plugins/bootstrap/js/bootstrap.bundle.min.js}"></script>
<script th:src="@{/dist/js/adminlte.min.js}"></script>
</body>
</html>
