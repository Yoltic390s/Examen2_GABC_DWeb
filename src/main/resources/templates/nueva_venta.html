<!DOCTYPE html>
<html lang="es" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="utf-8">
    <title>Sistema X | Nueva Venta</title>
    <link rel="stylesheet" th:href="@{/plugins/fontawesome-free/css/all.min.css}">
    <link rel="stylesheet" th:href="@{/dist/css/adminlte.min.css}">
</head>
<body class="hold-transition sidebar-mini">
<div class="wrapper">

    <nav class="main-header navbar navbar-expand navbar-white navbar-light">
        <ul class="navbar-nav"><li class="nav-item"><a class="nav-link" data-widget="pushmenu" href="#"><i class="fas fa-bars"></i></a></li></ul>
        <ul class="navbar-nav ml-auto"><li class="nav-item d-flex align-items-center mr-3"><i class="fas fa-user mr-2"></i> <span class="text-dark font-weight-bold" th:text="${nombreUsuario}"></span></li></ul>
    </nav>

    <aside class="main-sidebar sidebar-light-primary elevation-4">
        <a href="#" class="brand-link text-center"><span class="brand-text font-weight-light" style="font-size: 1.5rem; color: black;">Sistema X</span></a>
        <div class="sidebar">
            <nav class="mt-2">
                <ul class="nav nav-pills nav-sidebar flex-column">
                    <li class="nav-item"><a th:href="@{/dashboard}" class="nav-link"><i class="nav-icon fas fa-home"></i><p>Inicio</p></a></li>
                    <li class="nav-item"><a th:href="@{/productos}" class="nav-link"><i class="nav-icon fas fa-box"></i><p>Productos</p></a></li>
                    <li class="nav-item"><a th:href="@{/ventas}" class="nav-link active"><i class="nav-icon fas fa-shopping-cart"></i><p>Ventas</p></a></li>
                    <li class="nav-item"><a th:href="@{/facturacion}" class="nav-link"><i class="nav-icon fas fa-file-invoice-dollar"></i><p>Facturación</p></a></li>
                    <li class="nav-item border-top"><a th:href="@{/logout}" class="nav-link"><p class="text-dark">Salir</p></a></li>
                </ul>
            </nav>
        </div>
    </aside>

    <div class="content-wrapper bg-white">
        <section class="content-header">
            <div class="container-fluid"><h1>Nueva Venta</h1></div>
        </section>

        <section class="content mt-4">
            <div class="container-fluid">
                <div class="row">
                    <div class="col-md-6">
                        <form th:action="@{/ventas/guardar}" method="post">
                            <div class="form-group">
                                <label style="font-weight: normal;">Nombre cliente:</label>
                                <input type="text" class="form-control" name="nombreCliente" placeholder="Ingrese un nombre" required>
                            </div>
                            <div class="mt-4">
                                <button type="submit" class="btn btn-success mr-2" style="background-color: #6fb353; border-color: #6fb353; width: 120px;">Guardar</button>
                                <a th:href="@{/ventas}" class="btn btn-light border" style="width: 120px;">Cancelar</a>
                            </div>
                        </form>
                    </div>
                </div>
            </div>
        </section>
    </div>
</div>
<script th:src="@{/plugins/jquery/jquery.min.js}"></script>
<script th:src="@{/plugins/bootstrap/js/bootstrap.bundle.min.js}"></script>
<script th:src="@{/dist/js/adminlte.min.js}"></script>
</body>
</html>
