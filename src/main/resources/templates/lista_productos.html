<!DOCTYPE html>
<html lang="es" xmlns:th="http://www.thymeleaf.org">
<head>
  <meta charset="utf-8">
  <title>Sistema X | Productos</title>
  <link rel="stylesheet" href="https://fonts.googleapis.com/css?family=Source+Sans+Pro:300,400,400i,700&display=fallback">
  <link rel="stylesheet" th:href="@{/plugins/fontawesome-free/css/all.min.css}">
  <link rel="stylesheet" th:href="@{/dist/css/adminlte.min.css}">
</head>
<body class="hold-transition sidebar-mini">
<div class="wrapper">

  <nav class="main-header navbar navbar-expand navbar-white navbar-light">
    <ul class="navbar-nav">
      <li class="nav-item"><a class="nav-link" data-widget="pushmenu" href="#" role="button"><i class="fas fa-bars"></i></a></li>
    </ul>
    <ul class="navbar-nav ml-auto">
      <li class="nav-item d-flex align-items-center mr-3">
        <i class="fas fa-user mr-2"></i> <span class="text-dark font-weight-bold" th:text="${nombreUsuario}"></span>
      </li>
    </ul>
  </nav>

  <aside class="main-sidebar sidebar-light-primary elevation-4">
    <a href="#" class="brand-link text-center"><span class="brand-text font-weight-light" style="font-size: 1.5rem; color: black;">Sistema X</span></a>
    <div class="sidebar">
      <nav class="mt-2">
        <ul class="nav nav-pills nav-sidebar flex-column" role="menu">
          <li class="nav-item"><a th:href="@{/dashboard}" class="nav-link"><i class="nav-icon fas fa-home"></i><p>Inicio</p></a></li>
          <li class="nav-item"><a th:href="@{/productos}" class="nav-link active"><i class="nav-icon fas fa-box"></i><p>Productos</p></a></li>
          <li class="nav-item"><a th:href="@{/ventas}" class="nav-link"><i class="nav-icon fas fa-shopping-cart"></i><p>Ventas</p></a></li>
          <li class="nav-item"><a th:href="@{/facturacion}" class="nav-link"><i class="nav-icon fas fa-file-invoice-dollar"></i><p>Facturación</p></a></li>
          <li class="nav-header"></li>
          <li class="nav-item border-top"><a th:href="@{/logout}" class="nav-link"><p class="text-dark">Salir</p></a></li>
        </ul>
      </nav>
    </div>
  </aside>

  <div class="content-wrapper">
    <section class="content-header">
      <div class="container-fluid">
        <div class="row mb-2">
          <div class="col-sm-6"><h1>Catálogo de Productos</h1></div>
          <div class="col-sm-6 text-right">
            <a th:href="@{/productos/nuevo}" class="btn btn-primary">Nuevo Producto</a>
          </div>
        </div>
      </div>
    </section>

    <section class="content">
      <div class="card">
        <div class="card-body p-0">
          <table class="table table-striped table-bordered text-center">
            <thead class="bg-light">
            <tr>
              <th>Id</th>
              <th>Nombre</th>
              <th>Descripción</th>
              <th>Precio ($)</th>
              <th>Stock</th>
              <th>Acciones</th>
            </tr>
            </thead>
            <tbody>
            <tr th:each="prod : ${productos}">
              <td th:text="${prod.id}"></td>
              <td th:text="${prod.nombre}" class="font-weight-bold"></td>
              <td th:text="${prod.descripcion}"></td>
              <td th:text="${prod.precio}"></td>
              <td>
                <span th:class="${prod.stock <= 5 ? 'badge badge-danger' : 'badge badge-success'}" th:text="${prod.stock}"></span>
              </td>
              <td>
                <a class="btn btn-warning btn-sm text-dark font-weight-bold" th:href="@{/productos/editar/{id}(id=${prod.id})}">Editar</a>
                <a class="btn btn-danger btn-sm" th:href="@{/productos/borrar/{id}(id=${prod.id})}">Borrar</a>
              </td>
            </tr>
            </tbody>
          </table>
        </div>
      </div>
    </section>
  </div>
</div>
<script th:src="@{/plugins/jquery/jquery.min.js}"></script>
<script th:src="@{/plugins/bootstrap/js/bootstrap.bundle.min.js}"></script>
<script th:src="@{/dist/js/adminlte.min.js}"></script>
</body>
</html>
